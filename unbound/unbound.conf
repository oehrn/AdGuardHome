server:
    # Disable chroot — Docker already isolates the process, and chroot
    # setup tries to mknod /dev/random etc. which fails in unprivileged
    # LXC containers ("Operation not permitted").
    chroot: ""
    username: ""

    # Listen on all interfaces inside the dnsnet bridge.
    interface: 0.0.0.0
    port: 53

    # Allow queries from the Docker bridge network only. AdGuard Home is
    # the only client; nothing else should reach this resolver.
    access-control: 127.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow
    access-control: 10.0.0.0/8 allow

    # Disable IPv6 by default. Enable if your LAN has working IPv6.
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # Privacy / hardening
    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-referral-path: yes
    use-caps-for-id: yes
    qname-minimisation: yes
    aggressive-nsec: yes

    # Caching
    prefetch: yes
    prefetch-key: yes
    cache-min-ttl: 300
    cache-max-ttl: 86400
    serve-expired: yes
    serve-expired-ttl: 3600

    # DNSSEC trust anchor. mvance/unbound image does not ship this file
    # (the upstream /unbound.sh entrypoint normally fetches it via
    # unbound-anchor on first start; we bypass that script). Unbound
    # auto-creates and maintains this file via RFC5011 probes as long
    # as the directory is writable.
    auto-trust-anchor-file: "/opt/unbound/etc/unbound/root.key"

    # Root hints — left unset on purpose. The image does not ship
    # /opt/unbound/etc/unbound/root.hints, and Unbound has the IANA
    # root server list compiled in, which is refreshed by upstream
    # Unbound releases. Setting `root-hints:` to a missing file is a
    # fatal config error.

    # Logging — quiet by default. Bump to verbosity: 2 for debugging.
    verbosity: 0
    log-queries: no
    log-replies: no

    # Performance — modest defaults suitable for a home LAN.
    num-threads: 2
    msg-cache-size: 64m
    rrset-cache-size: 128m
    so-rcvbuf: 4m
    so-sndbuf: 4m

# Optional fallback: forward all queries via DoT to Quad9 / Cloudflare
# instead of iterating from the root. Uncomment if upstream root iteration
# becomes unreliable (e.g. ISP blocks port 53 outbound).
#
# forward-zone:
#     name: "."
#     forward-tls-upstream: yes
#     forward-addr: 9.9.9.9@853#dns.quad9.net
#     forward-addr: 149.112.112.112@853#dns.quad9.net
#     forward-addr: 1.1.1.1@853#cloudflare-dns.com
