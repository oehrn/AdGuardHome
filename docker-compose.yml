name: adguard-home

services:
  unbound:
    container_name: unbound
    image: mvance/unbound:latest
    restart: unless-stopped
    networks:
      - dnsnet
    volumes:
      - ./unbound/unbound.conf:/opt/unbound/etc/unbound/unbound.conf:ro
    # Override the upstream /unbound.sh entrypoint — it tries to
    # `cp` /dev/random|urandom|null into a chroot dir, which fails in
    # unprivileged LXC containers ("Operation not permitted") and crashes
    # the container. We invoke the binary directly. Before launching
    # unbound we bootstrap the DNSSEC root trust anchor (the image does
    # not ship /opt/unbound/etc/unbound/root.key), tolerating the exit
    # code 1 that unbound-anchor returns on initial bootstrap from its
    # compiled-in IANA key.
    entrypoint:
      - /bin/sh
      - -c
      - |
        /opt/unbound/sbin/unbound-anchor -a /opt/unbound/etc/unbound/root.key || true
        exec /opt/unbound/sbin/unbound -d -c /opt/unbound/etc/unbound/unbound.conf
    healthcheck:
      test: ["CMD", "drill", "@127.0.0.1", "nlnetlabs.nl"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  adguardhome:
    container_name: adguardhome
    image: adguard/adguardhome:latest
    restart: unless-stopped
    depends_on:
      unbound:
        condition: service_healthy
    networks:
      - dnsnet
    env_file:
      - path: .env
        required: false
    environment:
      TZ: ${TZ:-Etc/UTC}
    ports:
      # Plain DNS
      - "53:53/tcp"
      - "53:53/udp"
      # Admin UI (after initial setup)
      - "${ADGUARD_WEB_PORT:-80}:80/tcp"
      # Initial setup wizard (can be removed after setup)
      - "3000:3000/tcp"
      # Optional DoT
      # - "853:853/tcp"
      # Optional DoH (only if terminating HTTPS in container, not via reverse proxy)
      # - "443:443/tcp"
      # - "443:443/udp"
      # DHCP server — disabled. If enabled, switch to network_mode: host.
    volumes:
      - adguard_work:/opt/adguardhome/work
      - adguard_conf:/opt/adguardhome/conf

networks:
  dnsnet:
    driver: bridge

volumes:
  adguard_work:
  adguard_conf:
